<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FACULTECH Login</title>
  <!-- Add Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Add Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    .navbar {
      background: rgb(2, 55, 120);
      padding: 15px;
      z-index: 1000;
    }

    .navbar-brand {
      font-size: 24px;
      font-weight: bold;
      color: white !important;
    }

    .nav-link,
    .login-btn {
      color: white !important;
      padding-right: 10px;
      margin-right: 10px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, white, white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    .wrapper {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      max-width: 1000px;
      width: 100%;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.96);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .left-panel,
    .right-panel {
      flex: 1 1 400px;
      padding: 50px;
      transition: all 0.3s ease-in-out;
    }

    .left-panel {
      background: #fdfdfd;
    }

    .left-panel h2 {
      margin-bottom: 30px;
      color: #1e3c72;
      font-size: 30px;
    }

    .left-panel label {
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-size: 15px;
    }

    .left-panel input {
      width: 100%;
      padding: 14px;
      margin-bottom: 22px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
      background: #f8f8f8;
      transition: all 0.2s ease;
    }

    .left-panel input:focus {
      border-color: #2a5298;
      background: #fff;
      outline: none;
    }

    .left-panel button {
      width: 100%;
      padding: 14px;
      background: #1e3c72;
      border: none;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .left-panel button:hover {
      background: #16325c;
    }

    .left-panel a {
      color: #1e3c72;
      text-decoration: none;
      font-size: 14px;
    }

    .left-panel a:hover {
      text-decoration: underline;
    }

    .right-panel {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .right-panel h1 {
      margin-bottom: 12px;
      font-size: 32px;
      font-weight: bold;
    }

    .right-panel p {
      font-size: 16px;
      margin-bottom: 28px;
    }

    .role-buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 80%;
      max-width: 250px;
    }

    .role-buttons button {
      padding: 14px;
      background: #ffffff;
      color: #1e3c72;
      border: none;
      font-weight: bold;
      font-size: 15px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .role-buttons button:hover {
      background: #e3ebff;
      transform: translateY(-2px);
    }

    .message {
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 5px;
      text-align: center;
    }

    .success {
      background-color: #d4edda;
      color: #155724;
    }

    .error {
      background-color: #f8d7da;
      color: #721c24;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .right-panel,
      .left-panel {
        padding: 35px 25px;
      }
    }

    .active-nav {
      text-decoration: underline !important;
      text-underline-offset: 6px;
      font-weight: 900;
      border-bottom: 2px solid white;
    }
  </style>
</head>

<body>










  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="HOME.html">FaculTech👨‍🎓</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="btn btn-success login-btn " href="HOME.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-success login-btn " href="REGISTERPAGE.html">Register</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-success login-btn active-nav" href="LOGIN.html">Login</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-success login-btn " href="ABOUTUS.html">About Us</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="wrapper">
    <div class="container">
      <!-- Left Panel: Login Form -->
      <div class="left-panel">
        <h2 id="form-title">Welcome</h2>
        <form id="loginForm">
          <div id="form-content">
            <p>Select a role to begin.</p>
          </div>
        </form>
      </div>

      <!-- Right Panel: Role Quick Links -->
      <div class="right-panel">
        <h1>Welcome to FACULTECH</h1>
        <p>Choose your role to access features</p>
        <div class="role-buttons">
          <button onclick="showForm('Admin')">Admin</button>
          <button onclick="showForm('Faculty')">Faculty</button>
          <button onclick="showForm('HOD')">HOD</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentRole = '';
    let forgotPasswordEmail = '';
    let verifiedOTP = '';

    function showForm(role) {
      currentRole = role;
      const formTitle = document.getElementById("form-title");
      const formContent = document.getElementById("form-content");

      formTitle.innerText = role + " Login";
      formContent.innerHTML = `
        <label for="${role.toLowerCase()}Username">${role === "Faculty" ? "Email" : "Username"}</label>
        <input type="text" id="${role.toLowerCase()}Username" required />

        <label for="${role.toLowerCase()}Password">Password</label>
        <input type="password" id="${role.toLowerCase()}Password" required />

        ${role === "Faculty" ? `
          <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <a href="#" onclick="showForgotPassword()">Forgot Password?</a>
            <a href="REGISTERPAGE.html">Register</a>
          </div>` : ''}

        <button type="button" onclick="${role.toLowerCase()}Login()">Login</button>
      `;
    }

    function showForgotPassword() {
      const formTitle = document.getElementById("form-title");
      const formContent = document.getElementById("form-content");

      formTitle.innerText = "Forgot Password";
      formContent.innerHTML = `
        <label for="forgotEmail">Enter your email</label>
        <input type="email" id="forgotEmail" required />

        <button type="button" onclick="sendOTP()" style="margin-top: 20px;">Send OTP</button>
        <div style="text-align: center; margin-top: 15px;">
          <a href="#" onclick="showForm(currentRole)">Back to Login</a>
        </div>
      `;
    }

    async function sendOTP() {
      const email = document.getElementById("forgotEmail").value;
      forgotPasswordEmail = email; // Store the email for later use

      if (!email) {
        showMessage('Please enter your email', 'error');
        return;
      }

      try {
        const response = await fetch("/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        const data = await response.json();
        if (response.ok) {
          showOTPVerification();
          showMessage(data.message, 'success');
        } else {
          showMessage(data.message || 'Error sending OTP', 'error');
        }
      } catch (error) {
        showMessage('Failed to send OTP', 'error');
        console.error('Error:', error);
      }
    }

    function showOTPVerification() {
      const formTitle = document.getElementById("form-title");
      const formContent = document.getElementById("form-content");

      formTitle.innerText = "Verify OTP";
      formContent.innerHTML = `
        <p style="margin-bottom: 15px;">We sent a 6-digit code to ${forgotPasswordEmail}</p>
        <label for="otp">Enter OTP</label>
        <input type="text" id="otp" placeholder="6-digit code" required />
        
        <button type="button" onclick="verifyOTP()" style="margin-top: 20px;">Verify OTP</button>
        <div style="text-align: center; margin-top: 15px;">
          <a href="#" onclick="showForgotPassword()">Back</a>
        </div>
      `;
    }

    async function verifyOTP() {
      const otp = document.getElementById("otp").value;

      if (!otp || otp.length !== 6) {
        showMessage('Please enter a valid 6-digit OTP', 'error');
        return;
      }

      try {
        const response = await fetch("/verify-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: forgotPasswordEmail,
            otp
          })
        });

        const data = await response.json();

        if (response.ok) {
          verifiedOTP = otp;
          showResetPasswordForm();
          showMessage(data.message, 'success');
        } else {
          showMessage(data.message || 'Invalid OTP', 'error');
        }
      } catch (error) {
        showMessage('Error verifying OTP', 'error');
        console.error('Error:', error);
      }
    }

    function showResetPasswordForm() {
      const formTitle = document.getElementById("form-title");
      const formContent = document.getElementById("form-content");

      formTitle.innerText = "Reset Password";
      formContent.innerHTML = `
        <input type="hidden" id="verifiedOTP" value="${verifiedOTP}" />
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" required />
        
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" required />
        
        <button type="button" onclick="resetPassword()" style="margin-top: 20px;">Reset Password</button>
        <div style="text-align: center; margin-top: 15px;">
          <a href="#" onclick="showForm(currentRole)">Back to Login</a>
        </div>
      `;
    }

    async function resetPassword() {
      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const otp = document.getElementById("verifiedOTP").value;

      if (!newPassword || !confirmPassword) {
        showMessage('Please fill in all fields', 'error');
        return;
      }

      if (newPassword !== confirmPassword) {
        showMessage('Passwords do not match', 'error');
        return;
      }

      try {
        const response = await fetch("/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: forgotPasswordEmail,
            otp,
            newPassword,
            confirmPassword
          })
        });

        const data = await response.json();

        if (response.ok) {
          showMessage(data.message, 'success');
          setTimeout(() => showForm(currentRole), 2000);
        } else {
          showMessage(data.message || 'Error resetting password', 'error');
        }
      } catch (error) {
        showMessage('Error resetting password', 'error');
        console.error('Error:', error);
      }
    }

    function showMessage(message, type) {
      const formContent = document.getElementById("form-content");
      const existingMessage = formContent.querySelector('.message');

      if (existingMessage) {
        existingMessage.remove();
      }

      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${type}`;
      messageDiv.textContent = message;

      formContent.prepend(messageDiv);
      setTimeout(() => messageDiv.remove(), 5000);
    }

    async function adminLogin() {
      const username = document.getElementById("adminUsername").value;
      const password = document.getElementById("adminPassword").value;

      // Check if admin credentials match
      if (username === "admin" && password === "admin123") {
        // Redirect to admin dashboard
        window.location.href = "ADMINDASHBOARD.html";
      } else {
        showMessage("Invalid Admin credentials. Please try again.", 'error');
      }
    }

    async function hodLogin() {
      const username = document.getElementById("hodUsername").value;
      const password = document.getElementById("hodPassword").value;

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: username + "@hod.com",
            password
          })
        });

        const data = await res.json();
        if (res.ok) {
          // Store department in localStorage if needed
          if (data.department) {
            localStorage.setItem('hodDepartment', data.department);
          }
          window.location.href = data.redirect || "HODDASHBOARD.html";
        } else {
          showMessage(data.error || "Login failed", 'error');
        }
      } catch (error) {
        showMessage("Login failed. Please try again.", 'error');
        console.error('Error:', error);
      }
    }

    async function facultyLogin() {
      const email = document.getElementById("facultyUsername").value;
      const password = document.getElementById("facultyPassword").value;

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        if (res.ok) {
          // Store email in localStorage
          localStorage.setItem('facultyEmail', email);

          if (data.hasProfile) {

            window.location.href = "FACULTYDASHBOARD.html";
          } else {

            window.location.href = "FACULTYDASHBOARD.html?new=true";
          }
        } else {
          showMessage(data.error || "Login failed", 'error');
        }
      } catch (error) {
        showMessage("Login failed. Please try again.", 'error');
      }
    }   
  </script>
</body>

</html>
