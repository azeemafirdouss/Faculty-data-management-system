<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Faculty Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f1f8f9;
      color: #333;
    }
    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 30px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      color: #00897b;
      margin-bottom: 40px;
    }
    .actions {
      text-align: center;
      margin-top: 30px;
    }
    .btn {
      background: #00897b;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.3s;
    }
    .btn:hover {
      background: #004d40;
    }
    .profile-container {
      width: 150px;
      height: 150px;
      border: 3px solid #00897b;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 20px;
    }
    .profile-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .profile-info {
      text-align: center;
      margin-bottom: 30px;
    }
    .profile-section {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #eee;
    }
    .profile-section h3 {
      color: #00897b;
      margin-bottom: 10px;
    }
    section {
      margin-bottom: 40px;
      padding: 25px;
      border-left: 6px solid #00897b;
      background: #f9f9f9;
      border-radius: 12px;
    }
    section h3 {
      margin-top: 0;
      color: #00695c;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }
    .form-group {
      margin-bottom: 25px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #bbb;
      border-radius: 6px;
      box-sizing: border-box;
    }
    input[type="file"] {
      padding: 8px;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    .photo-preview img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid #00897b;
      margin-top: 15px;
    }
    #summary {
      display: none;
      margin-top: 40px;
    }
    #output p {
      margin: 12px 0;
      line-height: 1.6;
    }
    .document-upload {
      margin-top: 15px;
    }
    .uppercase-input {
      text-transform: uppercase;
    }
    .conference-entry {
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      background: #fff;
    }
    .conference-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .remove-conference {
      color: #f44336;
      cursor: pointer;
    }
    .age-display {
      color: #666;
      font-size: 0.9em;
      margin-top: 5px;
    }
    .summary-content {
      display: flex;
      gap: 30px;
    }
    .photo-container {
      width: 150px;
      height: 150px;
      border: 3px solid #00897b;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      margin-top: 20px;
    }
    .photo-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #output {
      flex: 1;
    }
    .profile-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .profile-info {
      flex: 1;
    }
    .summary-section {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #eee;
    }
    .summary-section h4 {
      color: #00897b;
      margin-bottom: 10px;
    }
    #formContainer {
      display: none;
    }
    #dashboardContainer {
      display: block;
    }
    .back-btn {
      background: #6c757d;
      margin-right: 10px;
    }
    .back-btn:hover {
      background: #5a6268;
    }
    #downloadProfileBtn {
      background: #4caf50;
    }
    #downloadProfileBtn:hover {
      background: #388e3c;
    }
    #formContainer #downloadProfileBtn {
      display: none;
    }
    .exp-research-group {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 20px;
    }
    .exp-research-group .form-group {
      flex: 1;
      margin-bottom: 0;
    }
    .exp-research-group .document-upload {
      flex: 1;
      margin-top: 0;
    }
    .exp-research-group textarea {
      min-height: 100px;
    }
    .certificate-link {
      color: #00897b;
      text-decoration: none;
      margin-right: 10px;
    }
    .certificate-link:hover {
      text-decoration: underline;
    }
    @media print {
      body * {
        visibility: hidden;
      }
      #profileContainer, #profileContainer * {
        visibility: visible;
      }
      #profileContainer {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        padding: 20px;
        box-sizing: border-box;
      }
    }







    .existing-file {
    display: block;
    margin-top: 5px;
    color: #00897b;
    font-size: 0.9em;
  }
  .existing-file a {
    color: inherit;
    text-decoration: none;
  }
  .existing-file a:hover {
    text-decoration: underline;
  }
  </style>
</head>
<body>
  <div class="container" id="dashboardContainer">
    <h2><i class="fas fa-user-tie"></i> Faculty Dashboard</h2>
    <div id="profileContainer"></div>
    <div class="actions">
      <button id="editProfileBtn" class="btn">
        <i class="fas fa-edit"></i> Edit Profile
      </button>
      <button id="downloadProfileBtn" class="btn" style="background: #4caf50; margin-left: 10px;">
        <i class="fas fa-print"></i> Print / Save PDF
      </button>
      <button id="logoutBtn" class="btn" style="background: #f44336; margin-left: 10px;">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </div>

  <div class="container" id="formContainer">
    <button id="backToDashboard" class="btn back-btn">
      <i class="fas fa-arrow-left"></i> Back to Dashboard
    </button>
    <h2><i class="fas fa-user-edit"></i> Faculty Profile Form</h2>
    <form id="facultyForm">
      <!-- Profile Photo -->
      <section>
        <h3><i class="fas fa-image"></i> Profile Photo</h3>
        <div class="form-group">
          <input type="file" id="photo" accept="image/*">
          <div class="photo-preview" id="photoPreview"></div>
        </div>
      </section>

      <!-- Personal Info -->
      <section>
        <h3><i class="fas fa-user"></i> Personal Information</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Full Name:</label>
            <input type="text" id="name" maxlength="30" pattern="[A-Za-z ]+" title="Only alphabets and spaces allowed (max 30 characters)" required>
          </div>
          <div class="form-group">
            <label>Date of Birth:</label>
            <input type="date" id="dob" required>
            <div class="age-display" id="ageDisplay"></div>
          </div>
          <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" required>
          </div>
          <div class="form-group">
            <label>Phone:</label>
            <div style="display: flex;">
              <span style="padding: 10px; background: #eee; border: 1px solid #bbb; border-radius: 6px 0 0 6px;">+91</span>
              <input type="tel" id="phone" pattern="[0-9]{10}" maxlength="10" style="border-radius: 0 6px 6px 0; flex: 1;" required>
            </div>
          </div>
          <div class="form-group">
            <label>Gender:</label>
            <select id="gender" required>
              <option value="">--Select--</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Aadhar Number:</label>
            <input type="text" id="aadhar" pattern="[0-9]{12}" maxlength="12" title="12-digit Aadhar number">
          </div>
          <div class="form-group">
            <label>PAN Number:</label>
            <input type="text" id="pan" class="uppercase-input" pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}" maxlength="10" title="Format: ABCDE1234F" oninput="this.value = this.value.toUpperCase()">
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group document-upload">
            <label>Upload Aadhar:</label>
            <input type="file" id="aadharUpload" accept=".pdf,.jpg,.png">
          </div>
          <div class="form-group document-upload">
            <label>Upload PAN:</label>
            <input type="file" id="panUpload" accept=".pdf,.jpg,.png">
          </div>
        </div>
      </section>

      <!-- SSC -->
      <section>
        <h3><i class="fas fa-school"></i> 10th / SSC Details</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>School Name:</label>
            <input type="text" id="sscSchool" maxlength="50" required>
          </div>
          <div class="form-group">
            <label>Board:</label>
            <input type="text" id="sscBoard" maxlength="50">
          </div>
          <div class="form-group">
            <label>Percentage:</label>
            <input type="number" id="sscPercent" min="0" max="100" step="0.01">
          </div>
          <div class="form-group">
            <label>Year of Passing:</label>
            <input type="number" id="sscYear" min="1975" max="2025">
          </div>
        </div>
        <div class="form-group document-upload">
          <label>Upload SSC Certificate:</label>
          <input type="file" id="sscCertificate" accept=".pdf,.jpg,.png">
        </div>
      </section>

      <!-- Intermediate -->
      <section>
        <h3><i class="fas fa-university"></i> Intermediate Details</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>College Name:</label>
            <input type="text" id="interCollege" maxlength="50">
          </div>
          <div class="form-group">
            <label>Percentage:</label>
            <input type="number" id="interPercent" min="0" max="100" step="0.01">
          </div>
          <div class="form-group">
            <label>Year of Passing:</label>
            <input type="number" id="interYear" min="1975" max="2025">
          </div>
        </div>
        <div class="form-group document-upload">
          <label>Upload Intermediate Certificate:</label>
          <input type="file" id="interCertificate" accept=".pdf,.jpg,.png">
        </div>
      </section>

      <!-- Degree -->
      <section>
        <h3><i class="fas fa-graduation-cap"></i> Degree / B.Tech</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>College:</label>
            <input type="text" id="degCollege" maxlength="50">
          </div>
          <div class="form-group">
            <label>Branch:</label>
            <input type="text" id="degBranch" maxlength="50">
          </div>
          <div class="form-group">
            <label>CGPA:</label>
            <input type="number" id="degCGPA" min="0" max="10" step="0.01">
          </div>
          <div class="form-group">
            <label>Year of Passing:</label>
            <input type="number" id="degYear" min="1975" max="2025">
          </div>
        </div>
        <div class="form-group document-upload">
          <label>Upload Degree Certificate:</label>
          <input type="file" id="degCertificate" accept=".pdf,.jpg,.png">
        </div>
      </section>

      <!-- PhD -->
      <section>
        <h3><i class="fas fa-user-tie"></i> Ph.D. Details</h3>
        <div class="form-group"><label>Status:</label>
          <select id="phdStatus" onchange="togglePhD()">
            <option value="">--Select--</option>
            <option value="Pursuing">Pursuing</option>
            <option value="Completed">Completed</option>
          </select>
        </div>
        <div class="form-group" id="phdDetailsBox" style="display:none;">
          <label>Details (Topic, Guide, Univ, Start Year):</label>
          <textarea id="phdDetails" maxlength="500"></textarea>
        </div>
      </section>

      <!-- Conferences -->
      <section id="conferencesSection">
        <h3><i class="fas fa-users"></i> Conferences</h3>
        <div id="conferenceEntries"></div>
        <button type="button" class="btn" onclick="addConference()" style="background: #5c6bc0; margin-top: 15px;">
          <i class="fas fa-plus"></i> Add Conference
        </button>
      </section>

      <!-- Experience & Research -->
      <section>
        <h3><i class="fas fa-briefcase"></i> Experience & Research</h3>
        <div class="form-group">
          <label>Total Experience (Years):</label>
          <input type="number" id="experience" min="0" max="50">
        </div>
        <div class="exp-research-group">
          <div class="form-group">
            <label>Awards:</label>
            <textarea id="awards" maxlength="500"></textarea>
          </div>
          <div class="form-group document-upload">
            <label>Upload Award Certificates:</label>
            <input type="file" id="awardsUpload" multiple accept=".pdf,.jpg,.png">
          </div>
        </div>
        <div class="exp-research-group">
          <div class="form-group">
            <label>Certifications:</label>
            <textarea id="certs" maxlength="500"></textarea>
          </div>
          <div class="form-group document-upload">
            <label>Upload Certification Documents:</label>
            <input type="file" id="certsUpload" multiple accept=".pdf,.jpg,.png">
          </div>
        </div>
        <div class="exp-research-group">
          <div class="form-group">
            <label>Research Paper Descriptions:</label>
            <textarea id="research" maxlength="1000"></textarea>
          </div>
          <div class="form-group document-upload">
            <label>Upload Research Papers:</label>
            <input type="file" id="researchPapers" multiple accept=".pdf,.jpg,.png">
          </div>
        </div>
      </section>

      <div class="actions">
        <button type="submit" class="btn">Submit & Generate Summary</button>
      </div>
    </form>
  </div>

  <script>
    // Global variables
    let conferenceCount = 0;
    let facultyEmail = '';

    // DOM Elements
    const dashboardContainer = document.getElementById('dashboardContainer');
    const formContainer = document.getElementById('formContainer');
    const profileContainer = document.getElementById('profileContainer');
    const facultyForm = document.getElementById('facultyForm');
    const photoInput = document.getElementById('photo');
    const photoPreview = document.getElementById('photoPreview');
    const dobInput = document.getElementById('dob');
    const ageDisplay = document.getElementById('ageDisplay');
    const phdStatusSelect = document.getElementById('phdStatus');
    const phdDetailsBox = document.getElementById('phdDetailsBox');
    const editProfileBtn = document.getElementById('editProfileBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const backToDashboard = document.getElementById('backToDashboard');
    const downloadProfileBtn = document.getElementById('downloadProfileBtn');

    // Initialize the page
    document.addEventListener('DOMContentLoaded', async () => {
      facultyEmail = localStorage.getItem('facultyEmail');
      
      if (!facultyEmail) {
        alert('Please login first');
        window.location.href = 'LOGIN.html';
        return;
      }

      const isNewFaculty = new URLSearchParams(window.location.search).has('new');
      
      if (isNewFaculty) {
        showProfileForm();
      } else {
        try {
          const response = await fetch(`/api/faculty/${facultyEmail}`);
          if (!response.ok) {
            throw new Error(`Failed to fetch profile: ${response.status} ${response.statusText}`);
          }
          const contentType = response.headers.get('content-type');
          if (!contentType || !contentType.includes('application/json')) {
            throw new Error('Expected JSON response, but received: ' + contentType);
          }
          const data = await response.json();
          
          if (data.exists) {
            displayProfile(data.profile);
          } else {
            showProfileForm();
          }
        } catch (error) {
          console.error('Error loading profile:', error);
          alert('Error loading profile: ' + error.message);
        }
      }
    });

    // Event Listeners
    editProfileBtn.addEventListener('click', showProfileForm);
    downloadProfileBtn.addEventListener('click', downloadProfileAsPDF);
    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem('facultyEmail');
      window.location.href = 'LOGIN.html';
    });
    backToDashboard.addEventListener('click', showDashboard);
    photoInput.addEventListener('change', handlePhotoUpload);
    dobInput.addEventListener('change', calculateAge);
    phdStatusSelect.addEventListener('change', togglePhD);
    facultyForm.addEventListener('submit', handleFormSubmit);

    // Functions
    async function showDashboard() {
      formContainer.style.display = 'none';
      dashboardContainer.style.display = 'block';

      try {
        const response = await fetch(`/api/faculty/${facultyEmail}`);
        if (!response.ok) {
          throw new Error(`Failed to fetch profile: ${response.status} ${response.statusText}`);
        }
        const contentType = response.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
          throw new Error('Expected JSON response, but received: ' + contentType);
        }
        const data = await response.json();

        if (data.exists) {
          displayProfile(data.profile);
        } else {
          alert('No profile found. Please complete your profile.');
          showProfileForm();
        }
      } catch (error) {
        console.error('Error loading profile:', error);
        alert('Error loading profile: ' + error.message);
      }
    }

    function showProfileForm() {
      dashboardContainer.style.display = 'none';
      formContainer.style.display = 'block';
      
      if (facultyEmail) {
        loadProfileData(facultyEmail);
      }
    }

    function displayProfile(profile) {
      const dob = profile.dob ? new Date(profile.dob).toLocaleDateString() : 'Not provided';
      
      profileContainer.innerHTML = `
        <div class="profile-info" style="width: 100%">
          ${profile.photoPath ? 
            `<div class="profile-container">
              <img src="/${profile.photoPath}">
            </div>` : 
            `<div class="profile-container" style="background: #eee; display: flex; align-items: center; justify-content: center;">
              <i class="fas fa-user" style="font-size: 50px; color: #aaa;"></i>
            </div>`}
          <h2>${profile.name || 'Not provided'}</h2>
          <p>${profile.email || 'Not provided'}</p>
        </div>
        
        <div class="profile-section" style="width: 100%">
          <h3><i class="fas fa-id-card"></i> Personal Information</h3>
          <p><strong>Date of Birth:</strong> ${dob}</p>
          <p><strong>Phone:</strong> ${profile.phone ? `+91 ${profile.phone}` : 'Not provided'}</p>
          <p><strong>Gender:</strong> ${profile.gender || 'Not provided'}</p>
          <p><strong>Aadhar:</strong> ${profile.aadhar || 'Not provided'} 
            ${profile.aadharPath ? `<a href="/${profile.aadharPath}" class="certificate-link" download>Download Aadhar</a>` : ''}</p>
          <p><strong>PAN:</strong> ${profile.pan || 'Not provided'} 
            ${profile.panPath ? `<a href="/${profile.panPath}" class="certificate-link" download>Download PAN</a>` : ''}</p>
        </div>
        
        <div class="profile-section" style="width: 100%">
          <h3><i class="fas fa-graduation-cap"></i> Education</h3>
          <p><strong>SSC (10th):</strong> ${profile.sscSchool || 'Not provided'} (${profile.sscBoard || 'Not provided'}, ${profile.sscPercent || 'N/A'}%, ${profile.sscYear || 'N/A'})
            ${profile.sscCertPath ? `<a href="/${profile.sscCertPath}" class="certificate-link" download>Download SSC Certificate</a>` : ''}</p>
          <p><strong>Intermediate:</strong> ${profile.interCollege || 'Not provided'} (${profile.interPercent || 'N/A'}%, ${profile.interYear || 'N/A'})
            ${profile.interCertPath ? `<a href="/${profile.interCertPath}" class="certificate-link" download>Download Intermediate Certificate</a>` : ''}</p>
          <p><strong>Degree:</strong> ${profile.degCollege || 'Not provided'} (${profile.degBranch || 'Not provided'}, ${profile.degCGPA || 'N/A'} CGPA, ${profile.degYear || 'N/A'})
            ${profile.degCertPath ? `<a href="/${profile.degCertPath}" class="certificate-link" download>Download Degree Certificate</a>` : ''}</p>
          ${profile.phdStatus ? `<p><strong>PhD:</strong> ${profile.phdStatus} ${profile.phdDetails ? `- ${profile.phdDetails}` : ''}</p>` : '<p><strong>PhD:</strong> Not provided</p>'}
        </div>
        
        <div class="profile-section" style="width: 100%">
          <h3><i class="fas fa-briefcase"></i> Professional Experience</h3>
          <p><strong>Total Experience:</strong> ${profile.experience || 0} years</p>
          ${profile.awards ? `<p><strong>Awards:</strong> ${profile.awards}</p>` : '<p><strong>Awards:</strong> None</p>'}
          ${profile.awardsCertPaths && profile.awardsCertPaths.length > 0 ? `
            <p><strong>Award Certificates:</strong> 
              ${profile.awardsCertPaths.map((path, index) => `<a href="/${path}" class="certificate-link" download>Download Award ${index + 1}</a>`).join(' ')}
            </p>` : ''}
          ${profile.certs ? `<p><strong>Certifications:</strong> ${profile.certs}</p>` : '<p><strong>Certifications:</strong> None</p>'}
          ${profile.certsPaths && profile.certsPaths.length > 0 ? `
            <p><strong>Certification Documents:</strong> 
              ${profile.certsPaths.map((path, index) => `<a href="/${path}" class="certificate-link" download>Download Certification ${index + 1}</a>`).join(' ')}
            </p>` : ''}
          ${profile.research ? `<p><strong>Research Papers:</strong> ${profile.research}</p>` : '<p><strong>Research Papers:</strong> None</p>'}
          ${profile.researchPapers && profile.researchPapers.length > 0 ? `
            <p><strong>Research Papers:</strong> 
              ${profile.researchPapers.map((path, index) => `<a href="/${path}" class="certificate-link" download>Download Paper ${index + 1}</a>`).join(' ')}
            </p>` : ''}
        </div>
        
        ${profile.conferences && profile.conferences.length > 0 ? `
        <div class="profile-section" style="width: 100%">
          <h3><i class="fas fa-users"></i> Conferences</h3>
          ${profile.conferences.map((conf, index) => `
            <p><strong>${conf.type || 'Not provided'}:</strong> ${conf.name || 'Not provided'} (Organized by: ${conf.organizedBy || 'Not provided'}) ${conf.isbn ? `ISBN: ${conf.isbn}` : ''}
              ${profile.conferenceCerts && profile.conferenceCerts[index] ? 
                `<a href="/${profile.conferenceCerts[index]}" class="certificate-link" download>Download Certificate</a>` : ''}
            </p>
          `).join('')}
        </div>` : '<div class="profile-section" style="width: 100%"><h3><i class="fas fa-users"></i> Conferences</h3><p>None</p></div>'}
      `;
    }

    async function loadProfileData(email) {
      try {
        const response = await fetch(`/api/faculty/${email}`);
        if (!response.ok) {
          throw new Error(`Failed to fetch profile: ${response.status} ${response.statusText}`);
        }
        const contentType = response.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
          throw new Error('Expected JSON response, but received: ' + contentType);
        }
        const data = await response.json();
        
        if (data.exists) {
          populateForm(data.profile);
        } else {
          // Pre-fill from registration data if it exists
          try {
            const userResponse = await fetch(`/api/faculty-user/${email}`);
            if (userResponse.ok) {
              const userData = await userResponse.json();
              document.getElementById('name').value = userData.name || '';
              document.getElementById('email').value = userData.email || email;
              document.getElementById('phone').value = userData.phone || '';
              if (userData.department) {
                document.getElementById('degBranch').value = userData.department;
              }
              // Make fields readonly as they are imported from registration
              ['name', 'email', 'phone', 'degBranch'].forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                  el.readOnly = true;
                  el.style.backgroundColor = '#f0f0f0';
                  el.style.cursor = 'not-allowed';
                  // if it's a select dropdown, we can disable pointer events
                  if (el.tagName === 'SELECT') {
                    el.style.pointerEvents = 'none';
                  }
                }
              });
            }
          } catch (e) {
            console.error('Error pre-filling registration data', e);
          }
        }
      } catch (error) {
        console.error('Error loading profile:', error);
      }
    }

    showMultipleExistingFiles('awardsUpload', profile.awardsCertPaths, 'Award');

  function showExistingFile(inputId, filePath, label) {
    if (!filePath) return;
    
    const container = document.getElementById(inputId).parentNode;
    const existingDiv = document.createElement('div');
    existingDiv.className = 'existing-file';
    existingDiv.innerHTML = `<strong>Existing ${label}:</strong> <a href="/${filePath}" target="_blank">View/Download</a>`;
    container.appendChild(existingDiv);
  }

  function showMultipleExistingFiles(inputId, filePaths, label) {
    if (!filePaths || filePaths.length === 0) return;
    
    const container = document.getElementById(inputId).parentNode;
    const existingDiv = document.createElement('div');
    existingDiv.className = 'existing-file';
    
    let links = [];
    filePaths.forEach((path, index) => {
      links.push(`<a href="/${path}" target="_blank">${label} ${index+1}</a>`);
    });
    
    existingDiv.innerHTML = `<strong>Existing ${label}s:</strong> ${links.join(', ')}`;
    container.appendChild(existingDiv);
  }

    function calculateAge() {
      const dob = dobInput.value;
      if (!dob) return 0;
      
      const birth = new Date(dob);
      const diff = Date.now() - birth.getTime();
      const age = new Date(diff).getUTCFullYear() - 1970;
      ageDisplay.textContent = `Age: ${age} years`;
      return age;
    }

    function togglePhD() {
      phdDetailsBox.style.display = phdStatusSelect.value ? 'block' : 'none';
    }

    async function handleFormSubmit(e) {
      e.preventDefault();
      
      if (!validateForm()) return;
      
      try {
        const formData = new FormData();
        
        formData.append('email', facultyEmail);
        formData.append('name', document.getElementById('name').value);
        formData.append('dob', document.getElementById('dob').value);
        formData.append('phone', document.getElementById('phone').value);
        formData.append('gender', document.getElementById('gender').value);
        formData.append('aadhar', document.getElementById('aadhar').value);
        formData.append('pan', document.getElementById('pan').value);
        formData.append('sscSchool', document.getElementById('sscSchool').value);
        formData.append('sscBoard', document.getElementById('sscBoard').value);
        formData.append('sscPercent', document.getElementById('sscPercent').value);
        formData.append('sscYear', document.getElementById('sscYear').value);
        formData.append('interCollege', document.getElementById('interCollege').value);
        formData.append('interPercent', document.getElementById('interPercent').value);
        formData.append('interYear', document.getElementById('interYear').value);
        formData.append('degCollege', document.getElementById('degCollege').value);
        formData.append('degBranch', document.getElementById('degBranch').value);
        formData.append('degCGPA', document.getElementById('degCGPA').value);
        formData.append('degYear', document.getElementById('degYear').value);
        formData.append('phdStatus', document.getElementById('phdStatus').value);
        formData.append('phdDetails', document.getElementById('phdDetails').value);
        formData.append('experience', document.getElementById('experience').value);
        formData.append('awards', document.getElementById('awards').value);
        formData.append('certs', document.getElementById('certs').value);
        formData.append('research', document.getElementById('research').value);

        if (photoInput.files[0]) formData.append('photo', photoInput.files[0]);
        if (document.getElementById('aadharUpload').files[0]) formData.append('aadharUpload', document.getElementById('aadharUpload').files[0]);
        if (document.getElementById('panUpload').files[0]) formData.append('panUpload', document.getElementById('panUpload').files[0]);
        if (document.getElementById('sscCertificate').files[0]) formData.append('sscCertificate', document.getElementById('sscCertificate').files[0]);
        if (document.getElementById('interCertificate').files[0]) formData.append('interCertificate', document.getElementById('interCertificate').files[0]);
        if (document.getElementById('degCertificate').files[0]) formData.append('degCertificate', document.getElementById('degCertificate').files[0]);

        const awardsUpload = document.getElementById('awardsUpload').files;
        for (let i = 0; i < awardsUpload.length; i++) {
          formData.append('awardsUpload', awardsUpload[i]);
        }
        
        const certsUpload = document.getElementById('certsUpload').files;
        for (let i = 0; i < certsUpload.length; i++) {
          formData.append('certsUpload', certsUpload[i]);
        }
        
        const researchPapers = document.getElementById('researchPapers').files;
        for (let i = 0; i < researchPapers.length; i++) {
          formData.append('researchPapers', researchPapers[i]);
        }

        const conferences = getConferenceData();
        formData.append('conferences', JSON.stringify(conferences));

        for (let i = 1; i <= conferenceCount; i++) {
          const certInput = document.getElementById(`conferenceCert-${i}`);
          if (certInput && certInput.files[0]) {
            formData.append('conferenceCertificates', certInput.files[0]);
          }
        }

        const submitBtn = document.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

        const response = await fetch('/api/faculty', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          const text = await response.text();
          throw new Error(`Server responded with status ${response.status}: ${text}`);
        }

        const contentType = response.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
          const text = await response.text();
          throw new Error(`Expected JSON response, but received ${contentType}: ${text}`);
        }

        const result = await response.json();
        
        if (response.ok) {
          alert('Profile saved successfully!');
          facultyForm.reset();
          photoPreview.innerHTML = '';
          document.getElementById('conferenceEntries').innerHTML = '';
          conferenceCount = 0;
          showDashboard();
        } else {
          throw new Error(result.message || 'Failed to save profile');
        }
      } catch (error) {
        console.error('Error:', error);
        alert(`Error: ${error.message}`);
      } finally {
        const submitBtn = document.querySelector('button[type="submit"]');
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Submit & Generate Summary';
        }
      }
    }

    function getConferenceData() {
      const conferences = [];
      
      for (let i = 1; i <= conferenceCount; i++) {
        const entry = document.getElementById(`conference-${i}`);
        if (entry) {
          conferences.push({
            type: document.getElementById(`conferenceType-${i}`).value,
            name: document.getElementById(`conferenceName-${i}`).value,
            organizedBy: document.getElementById(`organizedBy-${i}`).value,
            isbn: document.getElementById(`isbn-${i}`).value
          });
        }
      }
      
      return conferences;
    }

    function validateForm() {
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const phone = document.getElementById("phone").value;
      const dob = document.getElementById("dob").value;
      const aadhar = document.getElementById("aadhar").value;
      const pan = document.getElementById("pan").value;
      const sscPercent = document.getElementById("sscPercent").value;
      const interPercent = document.getElementById("interPercent").value;
      const degCGPA = document.getElementById("degCGPA").value;

      if (!/^[A-Za-z ]+$/.test(name)) {
        alert("Name should contain only alphabets and spaces.");
        return false;
      }

      if (name.length > 30) {
        alert("Name should not exceed 30 characters.");
        return false;
      }

      if (!email.includes("@") || !email.includes(".")) {
        alert("Enter a valid email address.");
        return false;
      }

      if (phone.length !== 10 || isNaN(phone)) {
        alert("Enter valid 10-digit phone number.");
        return false;
      }

      const age = calculateAge();
      if (age < 21) {
        alert("Faculty must be at least 21 years old.");
        return false;
      }

      if (aadhar && (aadhar.length !== 12 || isNaN(aadhar))) {
        alert("Aadhar number must be 12 digits.");
        return false;
      }

      if (pan && !/^[A-Z]{5}[0-9]{4}[A-Z]{1}$/.test(pan)) {
        alert("PAN must be in format: ABCDE1234F");
        return false;
      }

      if (sscPercent && (sscPercent < 0 || sscPercent > 100)) {
        alert("SSC percentage must be between 0 and 100");
        return false;
      }

      if (interPercent && (interPercent < 0 || interPercent > 100)) {
        alert("Intermediate percentage must be between 0 and 100");
        return false;
      }

      if (degCGPA && (degCGPA < 0 || degCGPA > 10)) {
        alert("CGPA must be between 0 and 10");
        return false;
      }

      const conferences = getConferenceData();
      for (const conf of conferences) {
        if (!conf.type) {
          alert("Please select participation type for all conferences");
          return false;
        }
        if (!conf.name) {
          alert("Please enter conference name for all conferences");
          return false;
        }
      }

      return true;
    }
    
    function downloadProfileAsPDF() {
      const element = document.getElementById('profileContainer').cloneNode(true);
      
      element.style.width = '100%';
      element.style.padding = '20px';
      element.style.boxSizing = 'border-box';
      
      const tempContainer = document.createElement('div');
      tempContainer.appendChild(element);
      tempContainer.style.position = 'absolute';
      tempContainer.style.left = '-9999px';
      document.body.appendChild(tempContainer);

      const opt = {
        margin: 10,
        filename: `${facultyEmail.split('@')[0]}_profile.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { 
          scale: 2,
          scrollY: 0,
          useCORS: true,
          allowTaint: true,
          letterRendering: true,
          backgroundColor: '#ffffff'
        },
        jsPDF: { 
          unit: 'mm', 
          format: 'a4', 
          orientation: 'portrait'
        },
        pagebreak: { mode: 'avoid-all' }
      };

      html2pdf()
        .set(opt)
        .from(tempContainer)
        .save()
        .then(() => {
          document.body.removeChild(tempContainer);
        });
    }
